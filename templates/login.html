{% extends 'base.html' %}

{% block auth_content %}
<div class="auth-wrapper">
    <div class="auth-card glass-card">
        <div class="auth-header text-center">
            <h2><i class="fa-solid fa-bolt"></i> Access Portal</h2>
            <p>Enter your credentials to continue</p>
        </div>
        
        <form method="POST" action="/login" class="auth-form">
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="username" placeholder="admin or user" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block glow mt-2">Authenticate <i class="fa-solid fa-arrow-right"></i></button>
        </form>
        
        <div class="auth-footer text-center mt-2">
            <p><small>Hint: admin/admin OR user/password</small></p>
            <a href="/" class="text-link"><i class="fa-solid fa-arrow-left"></i> Back home</a>
        </div>
    </div>
</div>
{% endblock %}
