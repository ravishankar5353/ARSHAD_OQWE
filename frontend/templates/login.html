{% extends 'base.html' %}

{% block auth_content %}
<div class="auth-wrapper">
    <div class="auth-card glass-card fade-in-up">
        <div class="auth-header text-center">
            <h2><i class="fa-solid fa-bolt"></i> AOQRWE Secure Access</h2>
            <p>Please enter your credentials to proceed</p>
        </div>
        
        <form method="POST" action="/login" class="auth-form">
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="username" placeholder="Enter username" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block glow mt-2">Sign In <i class="fa-solid fa-right-to-bracket"></i></button>
        </form>
        
        <div class="auth-footer text-center mt-3">
            <a href="/" class="text-link"><i class="fa-solid fa-arrow-left"></i> Home</a>
        </div>
    </div>
</div>
{% endblock %}
